<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES text encryption</title>
    <link rel="stylesheet" href="/static/hashing_text_base64/static/style.css">
</head>
<body>
    <div class="container py-12 py-12-mobile">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold mb-2 text-white">AES Text Encryption</h1>
            <p class="text-lg text-gray-400">Encrypt text with AES and get Base64 output</p>
        </header>

        <main class="bg-dark-800 rounded-xl shadow-2xl border border-dark-700 p-6 md:p-8">
            <div class="flex flex-col gap-6">
                <div>
                    <label class="text-white font-medium mb-2 block">AES Key</label>
                    <textarea id="keyInput" class="single-line" placeholder="Enter AES key..."></textarea>
                </div>

                <div>
                    <label class="text-white font-medium mb-2 block">Input Text</label>
                    <textarea id="inputText" placeholder="Enter text to encrypt..."></textarea>
                </div>

                <div class="flex flex-col items-center justify-center">
                    <button id="convertBtn" class="convert-btn">Encrypt Text</button>
                    <div id="copyBtn" class="mt-4 opacity-0 transition-opacity duration-300">
                        <button class="copy-btn">Copy Result</button>
                    </div>
                </div>

                <div>
                    <label class="text-white font-medium mb-2 block">Base64 Result</label>
                    <textarea id="outputText" readonly placeholder="Encrypted Base64 payload will appear here..."></textarea>
                </div>
            </div>

            <div id="loadingIndicator" class="loading mt-6">
                <div class="spinner"></div>
                <p class="mt-2 text-gray-400">Processing your request...</p>
            </div>

            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-900 border border-red-700 rounded-lg">
                <p class="text-red-300 font-medium">Error</p>
                <p id="errorText" class="text-red-400 text-sm mt-1"></p>
            </div>
        </main>
    </div>

    <script src="/static/hashing_text_base64/static/script.js"></script>
</body>
</html>
